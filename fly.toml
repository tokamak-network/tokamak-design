# fly.toml — Tokamak Design
# Adjust `app` to a name you've registered on Fly (or run `fly launch` to pick one).

app = "tokamak-design"
primary_region = "nrt"

[build]

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "performance-1x"
  memory = "2gb"
